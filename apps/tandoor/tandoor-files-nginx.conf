server {
    listen 80;
    server_name _;  # Accept any hostname since Traefik handles routing
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Disable server tokens for security
    server_tokens off;
    
    # Set client max body size
    client_max_body_size 128M;
    
    # Static files - matches your volume mount /var/www/static
    location /static/ {
        alias /var/www/static/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri $uri/ =404;
    }
    
    # Media files - matches your volume mount /var/www/media
    location /media/ {
        alias /var/www/media/;
        # Only add Content-Disposition if filename parameter is provided
        # This is more secure and follows CodeRabbit's recommendation
        add_header Content-Disposition "attachment; filename=\"$arg_filename\"" always;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri $uri/ =404;
    }
    
    # Default location for any other requests (should not happen due to Traefik routing)
    location / {
        return 404;
    }
}