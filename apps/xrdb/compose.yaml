services:
  xrdb:
    container_name: xrdb
    image: ghcr.io/ibbylabs/xrdb:${XRDB_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      XRDB_PREVIEW_ORIGIN: ${XRDB_PREVIEW_ORIGIN:-}
      PREVIEW_INTERNAL_ORIGIN: ${PREVIEW_INTERNAL_ORIGIN:-http://127.0.0.1:3000}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
    expose:
      - 3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.xrdb.rule=Host(`${XRDB_HOSTNAME?}`)"
      - "traefik.http.routers.xrdb.entrypoints=websecure"
      - "traefik.http.routers.xrdb.tls.certresolver=letsencrypt"
      - "traefik.http.routers.xrdb.middlewares=authelia@docker"
      - "traefik.http.services.xrdb.loadbalancer.server.port=3000"
    volumes:
      - ${DOCKER_DATA_DIR}/xrdb:/app/data
    profiles:
      - xrdb
      - all